name: Update System Logs

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      # Required to push the updated README back to your repository
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Aggregator Script
        env:
          # The standard GITHUB_TOKEN is automatically provided by GitHub Actions.
          # You do NOT need to manually create a Personal Access Token (PAT) for this.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_logs.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md

          if git diff --staged --quiet; then
            echo "No new high-signal activity to log. Skipping commit."
          else
            git commit -m "docs: auto-update system logs [skip ci]"
            git push
          fi